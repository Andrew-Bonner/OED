name: CI

on:
  pull_request:
    branches: [dev, prod]
  push:
    branches: [dev, prod]

jobs:
  test:
    runs-on: ubuntu-latest
    steps: 
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
  
      - name: Install deps
        run: npm ci

      - name: Run Tests
        run: npm run testsome src/server/test/routes/userRoutesTests.js