name: CD (Dev)

on:
  push:
    branches: [dev]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Dev Deploy Hook
        env:
          DEV_DEPLOY_HOOK: ${{secrets.OED_DEPLOY}}
        run: |
          if [ -z "$DEV_DEPLOY_HOOK" ]; then
            echo "Missing DEV_DEPLOY_HOOK secret. Set it in GitHub Settings → Secrets."
            exit 1
          fi
          echo "Triggering Render deploy hook..."
          curl -fsS -X POST "$DEV_DEPLOY_HOOK"
          echo "Deploy hook triggered successfully."
